services:
  postgres:
    image: postgres:16-alpine
    container_name: instacart_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline:
    build: .
    container_name: instacart_pipeline
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PSQL_EXE: psql
      PYTHON_EXE: python
    volumes:
      - ./data:/app/data
      - ./sql:/app/sql
      - ./src:/app/src
      - ./flows:/app/flows
    command: ["python", "flows/instacart_flow.py"]

volumes:
  postgres_data: